apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-conversion
  namespace: file-processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-conversion
  template:
    metadata:
      labels:
        app: celery-conversion
    spec:
      containers:
        - name: celery
          image: file-processor-api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "celery_config", "worker", "--loglevel=info", "--concurrency=4", "-Q", "conversions"]
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: DATABASE_URL
              value: postgresql://fileuser:filepass123@postgres:5432/file_processor
            - name: GOTENBERG_URL
              value: http://gotenberg:3000
            - name: UPLOAD_DIR
              value: /app/uploads
          volumeMounts:
            - name: upload-data
              mountPath: /app/uploads
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      restartPolicy: Always
      volumes:
        - name: upload-data
          emptyDir: {}
---
