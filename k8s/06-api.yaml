apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: file-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: file-processor-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: DATABASE_URL
              value: postgresql://fileuser:filepass123@postgres:5432/file_processor
            - name: GOTENBERG_URL
              value: http://gotenberg:3000
            - name: UPLOAD_DIR
              value: /app/uploads
          volumeMounts:
            - name: upload-data
              mountPath: /app/uploads
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      restartPolicy: Always
      volumes:
        - name: upload-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: file-processor
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
  clusterIP: None
