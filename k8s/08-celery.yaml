apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: file-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery
          image: file-processor-api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "celery_config", "beat", "--loglevel=info"]
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
