version: '3.8'

services:
  # Redis for message queue and caching
  redis:
    image: redis:7-alpine
    restart: always
    # Do not publish Redis port to host to avoid conflicts with host Redis
    # Containers on the same docker network can still reach Redis at redis:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - file_processor_network

  # PostgreSQL for metadata storage
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: file_processor
      POSTGRES_USER: fileuser
      POSTGRES_PASSWORD: filepass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Do not publish Postgres port to host to avoid conflicts with host Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileuser -d file_processor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - file_processor_network

  # Gotenberg for document conversion
  gotenberg:
    image: gotenberg/gotenberg:7
    restart: always
    ports:
      - "3001:3000"
    networks:
      - file_processor_network

  # API Gateway / Load Balancer
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - file_processor_network

  # Main API Service
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://fileuser:filepass123@postgres:5432/file_processor
      - GOTENBERG_URL=http://gotenberg:3000
      - UPLOAD_DIR=/app/uploads
    volumes:
      - upload_data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - file_processor_network

  # Celery Workers - Conversion Queue
  celery_conversion:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A celery_config worker --loglevel=info --concurrency=4 -Q conversions
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://fileuser:filepass123@postgres:5432/file_processor
      - GOTENBERG_URL=http://gotenberg:3000
      - UPLOAD_DIR=/app/uploads
    volumes:
      - upload_data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - file_processor_network
    deploy:
      replicas: 2

  # Celery Workers - Batch Queue
  celery_batch:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A celery_config worker --loglevel=info --concurrency=2 -Q batch
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://fileuser:filepass123@postgres:5432/file_processor
      - GOTENBERG_URL=http://gotenberg:3000
      - UPLOAD_DIR=/app/uploads
    volumes:
      - upload_data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - file_processor_network
    deploy:
      replicas: 1

  # Celery Workers - PDF Operations
  celery_pdf:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A celery_config worker --loglevel=info --concurrency=4 -Q pdf_operations
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://fileuser:filepass123@postgres:5432/file_processor
      - GOTENBERG_URL=http://gotenberg:3000
      - UPLOAD_DIR=/app/uploads
    volumes:
      - upload_data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - file_processor_network

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A celery_config beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - file_processor_network

  # Flower - Celery Monitoring
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5555:5555"
    command: celery -A celery_config flower --port=5555
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - celery_conversion
    networks:
      - file_processor_network

volumes:
  redis_data:
  postgres_data:
  upload_data:

networks:
  file_processor_network:
    driver: bridge
