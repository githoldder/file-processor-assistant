apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotenberg
  namespace: file-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gotenberg
  template:
    metadata:
      labels:
        app: gotenberg
    spec:
      containers:
        - name: gotenberg
          image: gotenberg/gotenberg:7
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: gotenberg
  namespace: file-processor
spec:
  selector:
    app: gotenberg
  ports:
    - port: 3000
      targetPort: 3000
  clusterIP: None
